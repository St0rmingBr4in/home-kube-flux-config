---
- name: Setup k3s cluster
  hosts: k3s_cluster
  gather_facts: true
  become: true
  pre_tasks:
    - name: Add subuid/subgid range for UID 1000 (rootless BuildKit in CI pods)
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        line: "1000:200000:65536"
        regexp: "^1000:"
      loop:
        - /etc/subuid
        - /etc/subgid

    - name: Raise inotify limits for Kubernetes workloads
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-k8s-inotify.conf
        reload: true
      loop:
        - { name: fs.inotify.max_user_instances, value: "512" }
        - { name: fs.inotify.max_user_watches, value: "524288" }
  roles:
    - role: xanmanning.k3s
  # ── iSCSI keepalive configuration ──────────────────────────────────────────
  # Configure iSCSI session keepalives so dropped sessions are detected
  # and recovered in ~10s instead of the default 120s.
  # Inlined here (was the iscsi role) — k3s-cluster-specific, never reused.
  tasks:
    - name: Install open-iscsi
      ansible.builtin.package:
        name: open-iscsi
        state: present

    - name: Configure iSCSI keepalive and timeout settings
      ansible.builtin.lineinfile:
        path: /etc/iscsi/iscsid.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: true
      loop:
        # Time to wait for a transport-layer reconnect before declaring the
        # session dead and returning I/O errors to the filesystem. Default: 120.
        - regexp: '^node\.session\.timeo\.replacement_timeout'
          line: 'node.session.timeo.replacement_timeout = 30'
        # Send a NOP-Out keepalive every 5s to detect silent TCP drops.
        - regexp: '^node\.conn\.timeo\.noop_out_interval'
          line: 'node.conn.timeo.noop_out_interval = 5'
        # Declare the connection dead if no NOP-In reply arrives within 5s.
        - regexp: '^node\.conn\.timeo\.noop_out_timeout'
          line: 'node.conn.timeo.noop_out_timeout = 5'
      notify: Restart iscsid

    - name: Apply replacement_timeout to existing iSCSI node records
      ansible.builtin.command:
        cmd: >
          iscsiadm -m node --op update
          -n node.session.timeo.replacement_timeout -v 30
      register: iscsiadm_result
      # rc=21 means no node records exist yet (iSCSI not yet logged in) — skip gracefully.
      # Any other non-zero exit code indicates a real failure and should be surfaced.
      failed_when: iscsiadm_result.rc not in [0, 21]
      changed_when: iscsiadm_result.rc == 0

    # ── Storage class defaults ──────────────────────────────────────────────────
    # k3s creates the local-path StorageClass with is-default-class=true.
    # Patch it to false so that synology-csi-iscsi-retain remains the only default.
    - name: Ensure local-path is not the default storage class
      ansible.builtin.command:
        cmd: >
          kubectl patch storageclass local-path
          --type merge
          -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
      register: patch_sc_result
      changed_when: "'patched' in patch_sc_result.stdout"
      failed_when: patch_sc_result.rc != 0 and 'not found' not in patch_sc_result.stderr
      run_once: true
      delegate_to: "{{ groups['server'][0] }}"

  handlers:
    - name: Restart iscsid
      ansible.builtin.service:
        name: iscsid
        state: restarted
