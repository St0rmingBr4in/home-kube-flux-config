---
- name: Check if tailscale binary is present
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_binary

- name: Install Tailscale
  ansible.builtin.shell:
    cmd: curl -fsSL https://tailscale.com/install.sh | sh
  when: not tailscale_binary.stat.exists

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Get Tailscale status
  ansible.builtin.command:
    cmd: tailscale status --json
  register: tailscale_status_raw
  changed_when: false

- name: Parse Tailscale status
  ansible.builtin.set_fact:
    tailscale_status: "{{ tailscale_status_raw.stdout | from_json }}"

- name: Bring up Tailscale (first auth or re-auth)
  ansible.builtin.command:
    cmd: "tailscale up --authkey={{ tailscale_authkey }} {{ tailscale_extra_args }}"
  when:
    - tailscale_authkey is defined
    - tailscale_status.BackendState != "Running"
  no_log: true

- name: Update Tailscale flags (exit node, routes, tags) when already running
  ansible.builtin.command:
    cmd: "tailscale up {{ tailscale_extra_args }}"
  when:
    - tailscale_status.BackendState == "Running"
  changed_when: true

- name: Get Tailscale status after bring-up
  ansible.builtin.command:
    cmd: tailscale status --json
  register: tailscale_status_after_raw
  changed_when: false

- name: Parse Tailscale status after bring-up
  ansible.builtin.set_fact:
    tailscale_status_after: "{{ tailscale_status_after_raw.stdout | from_json }}"

- name: Assert hostname is exactly 'inlet' (not 'inlet-1', 'inlet-2', etc.)
  ansible.builtin.assert:
    that:
      - tailscale_status_after.Self.HostName == "inlet"
    fail_msg: >
      Tailscale registered as '{{ tailscale_status_after.Self.HostName }}' instead of 'inlet'.
      A stale device named 'inlet' already exists in the tailnet.
      Delete it at https://login.tailscale.com/admin/machines then re-run this playbook.
    success_msg: "Tailscale hostname is 'inlet'."

- name: Get Tailscale status text
  ansible.builtin.command:
    cmd: tailscale status
  register: tailscale_status_text
  changed_when: false

- name: Assert exit node is advertised
  ansible.builtin.assert:
    that:
      - '"exit node" in tailscale_status_text.stdout'
    fail_msg: "Tailscale is not advertising as an exit node. Run with -e tailscale_authkey=... if this is a new node."
    success_msg: "Tailscale exit node is active."
