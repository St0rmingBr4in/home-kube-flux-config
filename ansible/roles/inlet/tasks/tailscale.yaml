---
# Install Tailscale and bring up the exit node using the official community role.
# The artis3n.tailscale role handles: apt repo setup, binary install, service
# management, and tailscale up flags — idempotently and with version tracking.
#
# Pass tailscale_authkey at runtime (-e tailscale_authkey=<oauth-secret>) only
# when registering a new device or re-authenticating an expired node.
# The role omits --authkey gracefully when the variable is undefined.

- name: Install and configure Tailscale via artis3n.tailscale role
  ansible.builtin.include_role:
    name: artis3n.tailscale
  vars:
    tailscale_authkey: "{{ tailscale_authkey | default(omit) }}"
    tailscale_args: "{{ tailscale_extra_args }}"
    # tailscale_up_skip: skip `tailscale up` if the node is already Running
    # (the role handles this automatically via its own state checks)

# ── Post-connection assertions ────────────────────────────────────────────────
# These verify inlet-specific invariants that the community role does not check.

- name: Get Tailscale status after bring-up
  ansible.builtin.command:
    cmd: tailscale status --json
  register: tailscale_status_after_raw
  changed_when: false

- name: Parse Tailscale status after bring-up
  ansible.builtin.set_fact:
    tailscale_status_after: "{{ tailscale_status_after_raw.stdout | from_json }}"

- name: Assert tailnet DNS name starts with 'inlet.' (not 'inlet-1.', 'inlet-2.', etc.)
  ansible.builtin.assert:
    that:
      - tailscale_status_after.Self.DNSName is defined
      - tailscale_status_after.Self.DNSName | regex_search('^inlet\\.') is not none
    fail_msg: >
      Tailscale assigned DNS name '{{ tailscale_status_after.Self.DNSName }}' instead of 'inlet.*'.
      A stale device named 'inlet' already exists in the tailnet and claimed the name first.
      Delete it at https://login.tailscale.com/admin/machines then re-run this playbook.
    success_msg: "Tailscale DNS name is '{{ tailscale_status_after.Self.DNSName }}' — hostname is 'inlet'."

- name: Get Tailscale status text
  ansible.builtin.command:
    cmd: tailscale status
  register: tailscale_status_text
  changed_when: false

- name: Assert exit node is advertised
  ansible.builtin.assert:
    that:
      - '"exit node" in tailscale_status_text.stdout'
    fail_msg: "Tailscale is not advertising as an exit node. Run with -e tailscale_authkey=... if this is a new node."
    success_msg: "Tailscale exit node is active."
