---
tailscale_extra_args: "--hostname=inlet --advertise-exit-node --accept-routes --advertise-tags=tag:servers"
# tailscale_authkey: never stored here — pass via -e at runtime (only for re-registration)

traefik_tailscale_ip: "100.92.78.42"

# Tailscale LoadBalancer IP for the qbittorrent-torrent k8s service (assigned by
# tailscale-operator). Used only for torrent port DNAT rules in iptables_nat.yaml.
# This is the service VIP, not the node IP — it is stable across reconnects.
qbittorrent_torrent_tailscale_ip: "100.122.130.88"

# MagicDNS short hostnames of qbittorrent peers whose Tailscale traffic must be
# deprioritised via DSCP CS1 / CAKE. Resolved dynamically at runtime by
# inlet-qos-watch.service — no static IPs needed.
qbittorrent_hostnames:
  - qbittorrent         # exit-node user (internet-bound torrent traffic)
  - qbittorrent-torrent # torrent peer (direct Tailscale peer traffic)

torrent_port: 6881
http_port: 80
https_port: 443
public_interface: "eth0"
sysctl_config_file: "/etc/sysctl.d/99-tailscale.conf"
