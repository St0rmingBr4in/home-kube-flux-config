---
extends: default

ignore: |
  ansible/roles/xanmanning.k3s/

rules:
  indentation: {spaces: 2, indent-sequences: consistent}
  line-length: disable
  comments:
    min-spaces-from-content: 1
  comments-indentation: false
  braces:
    max-spaces-inside: 1
  octal-values:
    # Kubernetes uses 0755-style octal for defaultMode — allow both forms.
    forbid-implicit-octal: false
    forbid-explicit-octal: false
