---
# Static checks pipeline: Go tests, yamllint, tflint.
# Each step runs only when its relevant paths change.

when:
  - event: [push, pull_request]
    path:
      - "memory-webhook/**"
      - "terraform/**"
      - "**/*.yaml"
      - "**/*.yml"
      - ".yamllint.yml"
      - ".woodpecker/checks.yaml"

steps:
  - name: go-test
    image: golang:1-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    when:
      - path:
          - "memory-webhook/**"
          - ".woodpecker/checks.yaml"
    environment:
      # Single source of truth for the Go version is memory-webhook/go.mod.
      # GOTOOLCHAIN=auto lets Go download whatever toolchain go.mod requires,
      # so the image tag only needs to be recent enough to support toolchains
      # (Go >= 1.21).
      GOTOOLCHAIN: auto
      # Limit parallelism to avoid OOM when compiling k8s.io dependencies on
      # a high-CPU node (default GOMAXPROCS equals the node's CPU count).
      GOMAXPROCS: "4"
    commands:
      - cd memory-webhook && go test ./...

  - name: yamllint
    image: python:3-alpine
    when:
      - path:
          - "**/*.yaml"
          - "**/*.yml"
          - ".yamllint.yml"
          - ".woodpecker/checks.yaml"
    commands:
      - pip install yamllint -q
      - yamllint -c .yamllint.yml .

  - name: tflint
    image: ghcr.io/terraform-linters/tflint
    when:
      - path:
          - "terraform/**"
          - ".woodpecker/checks.yaml"
    commands:
      - |
        for dir in terraform/*/; do
          echo "==> $dir"
          tflint --chdir="$dir" --minimum-failure-severity=error || exit 1
        done
