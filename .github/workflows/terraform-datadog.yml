name: Terraform - Datadog

on:
  push:
    branches: [master]
    paths:
      - terraform/datadog/**
      - .github/workflows/terraform-datadog.yml
  pull_request:
    paths:
      - terraform/datadog/**
      - .github/workflows/terraform-datadog.yml

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      - name: Terraform Lint
        run: make lint-terraform

      - name: Terraform Init
        run: make terraform-datadog-init

      - name: Terraform Plan
        run: make terraform-datadog-plan
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
          TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: make terraform-datadog-apply
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
          TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}

      - name: Report to Datadog CI Visibility
        if: always()
        run: make ci-report
