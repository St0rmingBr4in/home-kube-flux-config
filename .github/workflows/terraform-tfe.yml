name: Terraform - TFE workspaces

on:
  push:
    branches: [master]
    paths:
      - terraform/tfe/**
      - .github/workflows/terraform-tfe.yml
  pull_request:
    paths:
      - terraform/tfe/**
      - .github/workflows/terraform-tfe.yml

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: hashicorp/setup-terraform@b9cd54531c595c04d4ec14f7e8b6d7f28fd9822 # v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      - name: Terraform Init
        run: make terraform-tfe-init

      - name: Terraform Plan
        run: make terraform-tfe-plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: make terraform-tfe-apply

      - name: Report to Datadog CI Visibility
        if: always()
        run: make ci-report
