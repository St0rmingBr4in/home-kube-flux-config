name: Ansible - Configure inlet

on:
  push:
    branches: ["master"]
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-inlet.yaml"
  pull_request:
    branches: ["master"]
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-inlet.yaml"
  workflow_dispatch:
    inputs:
      qbittorrent_torrent_tailscale_ip:
        description: "Tailscale IP of qbittorrent-torrent LoadBalancer service (leave empty to skip torrent rules)"
        required: false
        default: ""
        type: string
      check_mode:
        description: "Run in check mode (dry-run, no changes applied)"
        required: false
        default: false
        type: boolean

jobs:
  ansible:
    runs-on: ubuntu-latest
    env:
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      INLET_SSH_PRIVATE_KEY: ${{ secrets.INLET_SSH_PRIVATE_KEY }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      QBITTORRENT_TAILSCALE_IP: ${{ inputs.qbittorrent_torrent_tailscale_ip }}
      CHECK_MODE: ${{ inputs.check_mode }}
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - run: make ansible-install-inlet
      - run: make lint-ansible
      - run: make ansible-setup-ssh-inlet
      - run: make ansible-inlet

      - name: Report to Datadog CI Visibility
        if: always()
        run: make ci-report
