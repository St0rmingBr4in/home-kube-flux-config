name: Ansible - Configure k3s cluster

on:
  push:
    branches: ["master"]
    paths:
      - "ansible/ansible.cfg"
      - "ansible/scripts/**"
      - "ansible/requirements.yml"
      - "ansible/inventory/hosts.yaml"
      - "ansible/inventory/group_vars/k3s_cluster/**"
      - "ansible/playbooks/k3s.yaml"
      - ".github/workflows/ansible-k3s.yaml"
  pull_request:
    branches: ["master"]
    paths:
      - "ansible/ansible.cfg"
      - "ansible/scripts/**"
      - "ansible/requirements.yml"
      - "ansible/inventory/hosts.yaml"
      - "ansible/inventory/group_vars/k3s_cluster/**"
      - "ansible/playbooks/k3s.yaml"
      - ".github/workflows/ansible-k3s.yaml"
  workflow_dispatch:
    inputs:
      check_mode:
        description: "Run in check mode (dry-run, no changes applied)"
        required: false
        default: true
        type: boolean

jobs:
  ansible:
    runs-on: ubuntu-latest
    env:
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      K3S_SSH_PRIVATE_KEY: ${{ secrets.K3S_SSH_PRIVATE_KEY }}
      CHECK_MODE: ${{ inputs.check_mode }}
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - run: make ansible-install-k3s
      - run: make lint-ansible
      - run: make ansible-setup-ssh-k3s
      - run: make ansible-k3s

      - name: Report to Datadog CI Visibility
        if: always()
        run: make ci-report
