name: Terraform - Authentik

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - terraform/authentik/**
      - .github/workflows/terraform-authentik.yml
  pull_request:
    paths:
      - terraform/authentik/**
      - .github/workflows/terraform-authentik.yml

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      - name: Terraform Lint
        run: make lint-terraform

      - name: Terraform Init
        run: make terraform-init

      - name: Terraform Plan
        run: make terraform-plan
        env:
          TF_VAR_authentik_token: ${{ secrets.AUTHENTIK_TOKEN }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: make terraform-apply
        env:
          TF_VAR_authentik_token: ${{ secrets.AUTHENTIK_TOKEN }}

      - name: Report to Datadog CI Visibility
        if: always()
        run: make ci-report
