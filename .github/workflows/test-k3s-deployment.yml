name: Test K3s Deployment

on:
  push:
    branches: ["**"]
    paths:
      - "argocd/applications/**"
      - ".github/workflows/test-k3s-deployment.yml"
  pull_request:
    paths:
      - "argocd/applications/**"
      - ".github/workflows/test-k3s-deployment.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - run: make k3s-prepare

      - uses: debianmaster/actions-k3s@master
        with:
          version: latest
          args: --disable=servicelb --disable=traefik

      - run: make k3s-wait-ready
      - run: make k3s-install-argocd
      - run: make k3s-configure-argocd
      - run: make k3s-apply-apps
      - run: make k3s-validate-apps

      - name: Summary
        if: always()
        run: make k3s-summary

      - name: Report to Datadog CI Visibility
        if: always()
        run: make ci-report
