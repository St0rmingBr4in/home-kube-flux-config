---
apiVersion: v1
kind: Service
metadata:
  name: memory-webhook
  namespace: prod-infra
  labels:
    app: memory-webhook
    app.kubernetes.io/name: memory-webhook
    app.kubernetes.io/instance: memory-webhook
spec:
  type: ClusterIP
  ports:
    - name: webhook-api
      port: 443
      targetPort: webhook-api
      protocol: TCP
  selector:
    app: memory-webhook
