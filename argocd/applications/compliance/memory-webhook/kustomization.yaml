---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - rbac.yaml
  - service.yaml
  - deployment.yaml
  - webhook-cert.yaml
  - mutating-webhook.yaml

# Image transformation - using public Docker Hub image
images:
  - name: memory-webhook
    newName: st0rmingbr4in/memory-webhook
    newTag: latest@sha256:9814ea0f691bd65141853ce844725cc430fe3a31af5fe18272d4fe4da91f7930

# Common labels
labels:
  - pairs:
      app.kubernetes.io/name: memory-webhook
      app.kubernetes.io/component: admission-controller
      app.kubernetes.io/part-of: oom-prevention

# Common annotations
commonAnnotations:
  app.kubernetes.io/managed-by: argocd
