---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - rbac.yaml
  - service.yaml
  - deployment.yaml
  - webhook-cert.yaml
  - mutating-webhook.yaml

# Image transformation - using public Docker Hub image
images:
  - name: memory-webhook
    newName: st0rmingbr4in/memory-webhook
    newTag: latest@sha256:da036469f04e47e3645cc15b62864265a68f25d7455d3c24d765e43c52cceac5

# Common labels
labels:
  - pairs:
      app.kubernetes.io/name: memory-webhook
      app.kubernetes.io/component: admission-controller
      app.kubernetes.io/part-of: oom-prevention

# Common annotations
commonAnnotations:
  app.kubernetes.io/managed-by: argocd
