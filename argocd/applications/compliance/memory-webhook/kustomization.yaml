---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - rbac.yaml
  - service.yaml
  - deployment.yaml
  - webhook-cert.yaml
  - mutating-webhook.yaml

# Image transformation - using public Docker Hub image
images:
  - name: memory-webhook
    newName: st0rmingbr4in/memory-webhook
    newTag: latest@sha256:e318093da2e097364dd8db78d2871b8f587c51cf0aea6441c9e5d8e7335ef212

# Common labels
labels:
  - pairs:
      app.kubernetes.io/name: memory-webhook
      app.kubernetes.io/component: admission-controller
      app.kubernetes.io/part-of: oom-prevention

# Common annotations
commonAnnotations:
  app.kubernetes.io/managed-by: argocd
