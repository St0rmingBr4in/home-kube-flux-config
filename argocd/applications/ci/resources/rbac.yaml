---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-ci
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-ci
  namespace: argo
rules:
  # Argo Workflows executor needs to manage pods
  - apiGroups: [""]
    resources: [pods, pods/exec, pods/log]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch]
  # Argo Events sensor pods need to create Workflows
  - apiGroups: [argoproj.io]
    resources: [workflows, workflowtemplates, workflowtaskresults]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-ci
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: argo-ci
    namespace: argo
roleRef:
  kind: Role
  name: argo-ci
  apiGroup: rbac.authorization.k8s.io
