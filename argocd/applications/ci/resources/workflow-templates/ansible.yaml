---
# Ansible CI workflow. Triggered by sensors for inlet and k3s playbooks.
#
# Vault secret layout (kv-v2):
#   secret/ci/ansible   → vault_password, inlet_ssh_private_key, k3s_ssh_private_key
#   secret/ci/tailscale → TF_VAR_tailscale_oauth_client_secret (inlet only, exported as TAILSCALE_AUTHKEY)
#   secret/ci/datadog   → TF_VAR_datadog_api_key (inlet only, exported as DATADOG_API_KEY)
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ci-ansible
  namespace: argo
spec:
  serviceAccountName: argo-ci
  entrypoint: main
  activeDeadlineSeconds: 1200  # 20 min hard limit
  synchronization:
    semaphore:
      configMapKeyRef:
        name: ci-semaphore
        key: ci
  arguments:
    parameters:
      - name: git-ref
      - name: playbook      # inlet | k3s
      - name: path-filter
      - name: git-sha
      - name: git-author-email
        default: ""
  hooks:
    running:
      expression: workflow.status == "Running"
      templateRef:
        name: ci-common
        template: ci-notify-running
      arguments:
        parameters:
          - name: sha
            value: "{{workflow.parameters.git-sha}}"
          - name: context
            value: "ci/ansible-{{workflow.parameters.playbook}}"
          - name: description
            value: "Running ci-ansible-{{workflow.parameters.playbook}}"
          - name: branch
            value: "{{workflow.parameters.git-ref}}"
          - name: start
            value: "{{workflow.creationTimestamp}}"
          - name: author-email
            value: "{{workflow.parameters.git-author-email}}"
    exit:
      templateRef:
        name: ci-common
        template: ci-notify-exit
      arguments:
        parameters:
          - name: sha
            value: "{{workflow.parameters.git-sha}}"
          - name: context
            value: "ci/ansible-{{workflow.parameters.playbook}}"
          - name: status
            value: "{{= workflow.status == 'Succeeded' ? 'success' : 'failure'}}"
          - name: branch
            value: "{{workflow.parameters.git-ref}}"
          - name: start
            value: "{{workflow.creationTimestamp}}"
          - name: author-email
            value: "{{workflow.parameters.git-author-email}}"
  templates:
    - name: main
      steps:
        - - name: ansible-run
            template: ansible-run

    - name: ansible-run
      podMetadata:
        annotations:
          ad.datadoghq.com/main.logs: "[{\"source\":\"argo-workflows\",\"service\":\"ci\",\"tags\":[\"ci.pipeline.id:{{workflow.uid}}\",\"ci.pipeline.name:ci/ansible-{{workflow.parameters.playbook}}\"]}]"
      script:
        image: docker.io/st0rmingbr4in/ci-ansible:latest
        command: [bash]
        resources:
          requests:
            memory: 512Mi
            cpu: 200m
          limits:
            memory: 1Gi
        env:
          - name: HOME
            value: /root
          - name: VAULT_ADDR
            value: "https://vault.prod-infra.svc.cluster.local:8200"
          - name: PLAYBOOK
            value: "{{workflow.parameters.playbook}}"
        source: |
          set -e

          # Clone repo to /root/workspace (not /tmp) so ansible.cfg is not ignored
          # Ansible silently ignores ansible.cfg in world-writable directories (/tmp is 1777)
          git clone --depth=2 \
            https://github.com/St0rmingBr4in/home-kube-flux-config \
            /root/workspace

          # Check if relevant paths changed
          cd /root/workspace
          CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null \
            || git show --stat --format="" HEAD | awk '{print $1}')
          if ! echo "$CHANGED" | grep -qE "{{workflow.parameters.path-filter}}"; then
            echo "No relevant changes detected, skipping ansible-${PLAYBOOK}"
            exit 0
          fi
          echo "Relevant changes detected, running ansible-${PLAYBOOK}"

          # Vault login via Kubernetes service account JWT
          VAULT_TOKEN=$(curl -sk \
            --data "{\"jwt\":\"$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)\",\"role\":\"argo-ci\"}" \
            "${VAULT_ADDR}/v1/auth/kubernetes/login" \
            | jq -r '.auth.client_token')
          [ -n "$VAULT_TOKEN" ] && [ "$VAULT_TOKEN" != "null" ] || { echo "Vault login failed"; exit 1; }

          # Ansible vault password (used by ansible.cfg → scripts/vault-password.sh)
          export ANSIBLE_VAULT_PASSWORD=$(curl -sk \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "${VAULT_ADDR}/v1/secret/data/ci/ansible" \
            | jq -r '.data.data.vault_password')

          # SSH setup
          mkdir -p /root/.ssh && chmod 700 /root/.ssh
          if [ "$PLAYBOOK" = "inlet" ]; then
            curl -sk \
              -H "X-Vault-Token: $VAULT_TOKEN" \
              "${VAULT_ADDR}/v1/secret/data/ci/ansible" \
              | jq -r '.data.data.inlet_ssh_private_key' > /root/.ssh/inlet_id_ed25519
            chmod 600 /root/.ssh/inlet_id_ed25519
            export TAILSCALE_AUTHKEY=$(curl -sk \
              -H "X-Vault-Token: $VAULT_TOKEN" \
              "${VAULT_ADDR}/v1/secret/data/ci/tailscale" \
              | jq -r '.data.data.TF_VAR_tailscale_oauth_client_secret')
            export DATADOG_API_KEY=$(curl -sk \
              -H "X-Vault-Token: $VAULT_TOKEN" \
              "${VAULT_ADDR}/v1/secret/data/ci/datadog" \
              | jq -r '.data.data.TF_VAR_datadog_api_key')
          else
            curl -sk \
              -H "X-Vault-Token: $VAULT_TOKEN" \
              "${VAULT_ADDR}/v1/secret/data/ci/ansible" \
              | jq -r '.data.data.k3s_ssh_private_key' > /root/.ssh/k3s_id_ed25519
            chmod 600 /root/.ssh/k3s_id_ed25519
          fi

          cd /root/workspace/ansible
          # ansible, ansible-lint, and galaxy collections are pre-baked in ci-ansible image.
          # Only local roles (iscsi) need to be combined with the pre-installed galaxy roles.
          export ANSIBLE_ROLES_PATH=/root/workspace/ansible/roles:/root/.ansible/roles

          if [ "$PLAYBOOK" = "inlet" ]; then
            EXTRA_VARS=""
            [ -n "${TAILSCALE_AUTHKEY:-}" ] && EXTRA_VARS="-e tailscale_authkey=${TAILSCALE_AUTHKEY}"
            ansible-lint
            ansible-playbook playbooks/inlet.yaml ${EXTRA_VARS}
          else
            ansible-lint
            ansible-playbook playbooks/k3s.yaml
          fi
