---
# Generic Terraform CI workflow. Triggered by sensors with module-specific parameters.
#
# Vault secret layout (kv-v2):
#   secret/ci/terraform-cloud  → token   (HCP Terraform token, exported as TF_TOKEN_APP_TERRAFORM_IO)
#   secret/ci/<module>         → TF_VAR_* fields (exported directly as env vars)
#
# Example Vault paths per module:
#   secret/ci/datadog          → TF_VAR_datadog_api_key, TF_VAR_datadog_app_key
#   secret/ci/digitalocean     → TF_VAR_digitalocean_token
#   secret/ci/tailscale        → TF_VAR_tailscale_oauth_client_id, TF_VAR_tailscale_oauth_client_secret
#   secret/ci/authentik        → TF_VAR_authentik_token
#   secret/ci/tfe              → (empty, TFC token is sufficient)
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ci-terraform
  namespace: argo
spec:
  serviceAccountName: argo-ci
  entrypoint: main
  activeDeadlineSeconds: 900  # 15 min hard limit
  synchronization:
    semaphore:
      configMapKeyRef:
        name: ci-semaphore
        key: ci
  arguments:
    parameters:
      - name: git-ref
      - name: module
      - name: path-filter
      - name: vault-secret-path
      - name: git-sha
  hooks:
    running:
      expression: workflow.status == "Running"
      templateRef:
        name: ci-common
        template: ci-notify-running
      arguments:
        parameters:
          - name: sha
            value: "{{workflow.parameters.git-sha}}"
          - name: context
            value: "ci/terraform-{{workflow.parameters.module}}"
          - name: description
            value: "Running ci-terraform-{{workflow.parameters.module}}"
          - name: branch
            value: "{{workflow.parameters.git-ref}}"
          - name: start
            value: "{{workflow.creationTimestamp}}"
    exit:
      templateRef:
        name: ci-common
        template: ci-notify-exit
      arguments:
        parameters:
          - name: sha
            value: "{{workflow.parameters.git-sha}}"
          - name: context
            value: "ci/terraform-{{workflow.parameters.module}}"
          - name: status
            value: "{{= workflow.status == 'Succeeded' ? 'success' : 'failure'}}"
          - name: branch
            value: "{{workflow.parameters.git-ref}}"
          - name: start
            value: "{{workflow.creationTimestamp}}"
  templates:
    - name: main
      steps:
        - - name: terraform-run
            template: terraform-run

    - name: terraform-run
      script:
        image: docker.io/st0rmingbr4in/ci-terraform:latest
        command: [sh]
        resources:
          requests:
            memory: 512Mi
            cpu: 200m
          limits:
            memory: 1Gi
        env:
          - name: VAULT_ADDR
            value: "https://vault.prod-infra.svc.cluster.local:8200"
        source: |
          set -e

          # Clone repo
          git clone --depth=2 \
            https://github.com/St0rmingBr4in/home-kube-flux-config \
            /tmp/workspace

          # Check if relevant paths changed
          cd /tmp/workspace
          CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null \
            || git show --stat --format="" HEAD | awk '{print $1}')
          if ! echo "$CHANGED" | grep -qE "{{workflow.parameters.path-filter}}"; then
            echo "No relevant changes detected, skipping terraform-{{workflow.parameters.module}}"
            exit 0
          fi
          echo "Relevant changes detected, running terraform-{{workflow.parameters.module}}"

          # Vault login via Kubernetes service account JWT
          VAULT_TOKEN=$(curl -sk \
            --data "{\"jwt\":\"$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)\",\"role\":\"argo-ci\"}" \
            "${VAULT_ADDR}/v1/auth/kubernetes/login" \
            | jq -r '.auth.client_token')
          [ -n "$VAULT_TOKEN" ] && [ "$VAULT_TOKEN" != "null" ] || { echo "Vault login failed"; exit 1; }

          # HCP Terraform Cloud credentials
          export TF_TOKEN_APP_TERRAFORM_IO=$(curl -sk \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "${VAULT_ADDR}/v1/secret/data/ci/terraform-cloud" \
            | jq -r '.data.data.token')
          # TFE provider also needs TFE_TOKEN (same token, different env var)
          export TFE_TOKEN="$TF_TOKEN_APP_TERRAFORM_IO"

          # Module-specific secrets: secret/ci/<module> → /v1/secret/data/ci/<module>
          SECRETS_API_PATH=$(echo "{{workflow.parameters.vault-secret-path}}" | sed 's|^secret/|secret/data/|')
          eval "$(curl -sk \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "${VAULT_ADDR}/v1/${SECRETS_API_PATH}" \
            | jq -r '.data.data | to_entries[] | "export " + .key + "=" + (.value | @sh)' 2>/dev/null || true)"

          make terraform-{{workflow.parameters.module}}-init
          make terraform-{{workflow.parameters.module}}-plan

          if [ "{{workflow.parameters.git-ref}}" = "refs/heads/master" ]; then
            make terraform-{{workflow.parameters.module}}-apply
          fi
