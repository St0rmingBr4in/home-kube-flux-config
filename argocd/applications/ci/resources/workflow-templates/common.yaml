---
# Reusable templates called by ci-terraform and ci-docker-build via templateRef.
# Volumes named "workspace" and "secrets" must be declared in the calling WorkflowTemplate.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ci-common
  namespace: argo
spec:
  templates:
    - name: git-clone
      script:
        image: alpine/git@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
        command: [sh]
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
        source: |
          git clone --depth=2 \
            https://github.com/St0rmingBr4in/home-kube-flux-config \
            /workspace
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: vault-login
      script:
        image: hashicorp/vault:1.17
        command: [sh]
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
        env:
          - name: VAULT_ADDR
            value: "https://vault.prod-infra.svc.cluster.local:8200"
          - name: VAULT_SKIP_VERIFY
            value: "true"
        source: |
          vault write -field=token auth/kubernetes/login \
            role=argo-ci \
            jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            > /secrets/vault-token
          echo "Vault login successful"
        volumeMounts:
          - name: secrets
            mountPath: /secrets

    - name: check-paths
      inputs:
        parameters:
          - name: path-filter
      script:
        image: alpine/git@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
        command: [sh]
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
        source: |
          git clone --depth=2 \
            https://github.com/St0rmingBr4in/home-kube-flux-config \
            /tmp/workspace
          cd /tmp/workspace
          CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null \
            || git show --stat --format="" HEAD | awk '{print $1}')
          if echo "$CHANGED" | grep -qE "{{inputs.parameters.path-filter}}"; then
            echo "changed"
          else
            echo "unchanged"
          fi

    - name: github-notify
      timeout: "2m"
      inputs:
        parameters:
          - name: sha
          - name: state
          - name: context
          - name: description
      script:
        image: alpine:3.21
        command: [sh]
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
        source: |
          set -e
          apk add --no-cache curl jq -q
          VAULT_TOKEN=$(curl -sk \
            --data "{\"jwt\":\"$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)\",\"role\":\"argo-ci\"}" \
            https://vault.prod-infra.svc.cluster.local:8200/v1/auth/kubernetes/login \
            | jq -r '.auth.client_token')
          GITHUB_TOKEN=$(curl -sk -H "X-Vault-Token: $VAULT_TOKEN" \
            https://vault.prod-infra.svc.cluster.local:8200/v1/secret/data/ci/github \
            | jq -r '.data.data.token')
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"state\":\"{{inputs.parameters.state}}\",\"target_url\":\"https://argo.st0rmingbr4in.com/workflows/argo/{{workflow.name}}\",\"description\":\"{{inputs.parameters.description}}\",\"context\":\"{{inputs.parameters.context}}\"}" \
            "https://api.github.com/repos/St0rmingBr4in/home-kube-flux-config/statuses/{{inputs.parameters.sha}}")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          echo "GitHub status API: $HTTP_CODE"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]

    - name: datadog-notify
      timeout: "2m"
      inputs:
        parameters:
          - name: name      # pipeline name e.g. "ci/terraform-datadog"
          - name: status    # running | success | failure (failure mapped to error)
          - name: sha       # git commit SHA
          - name: branch    # git ref e.g. "refs/heads/master"
          - name: start     # RFC3339 workflow start time
          - name: final     # "true" to include end timestamp
      script:
        image: alpine:3.21
        command: [sh]
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
        source: |
          set -e
          apk add --no-cache curl jq -q
          VAULT_TOKEN=$(curl -sk \
            --data "{\"jwt\":\"$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)\",\"role\":\"argo-ci\"}" \
            https://vault.prod-infra.svc.cluster.local:8200/v1/auth/kubernetes/login \
            | jq -r '.auth.client_token')
          [ -n "$VAULT_TOKEN" ] && [ "$VAULT_TOKEN" != "null" ] || { echo "Vault login failed"; exit 1; }
          DD_API_KEY=$(curl -sk -H "X-Vault-Token: $VAULT_TOKEN" \
            https://vault.prod-infra.svc.cluster.local:8200/v1/secret/data/ci/datadog \
            | jq -r '.data.data.TF_VAR_datadog_api_key')
          STATUS="{{inputs.parameters.status}}"
          [ "$STATUS" = "failure" ] && STATUS="error"
          BRANCH=$(echo "{{inputs.parameters.branch}}" | sed 's|refs/heads/||')
          PAYLOAD=$(jq -n \
            --arg name "{{inputs.parameters.name}}" \
            --arg uid "{{workflow.uid}}" \
            --arg url "https://argo.st0rmingbr4in.com/workflows/argo/{{workflow.name}}" \
            --arg start "{{inputs.parameters.start}}" \
            --arg status "$STATUS" \
            --arg sha "{{inputs.parameters.sha}}" \
            --arg branch "$BRANCH" \
            '{
              "data": {
                "type": "cipipeline_resource_request",
                "attributes": {
                  "provider_name": "argo-workflows",
                  "resource": {
                    "level": "pipeline",
                    "unique_id": $uid,
                    "name": $name,
                    "url": $url,
                    "start": $start,
                    "status": $status,
                    "git": {
                      "repository_url": "https://github.com/St0rmingBr4in/home-kube-flux-config",
                      "sha": $sha,
                      "branch": $branch
                    }
                  }
                }
              }
            }')
          if [ "{{inputs.parameters.final}}" = "true" ]; then
            PAYLOAD=$(echo "$PAYLOAD" | jq --arg end "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '.data.attributes.resource.end = $end')
          fi
          echo "Payload: $PAYLOAD"
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "DD-API-KEY: $DD_API_KEY" \
            -d "$PAYLOAD" \
            "https://api.datadoghq.eu/api/v2/ci/pipeline")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -1)
          echo "Datadog CI API: $HTTP_CODE — $BODY"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]

    # Combined running-state notification: GitHub (pending) + Datadog (running) in parallel.
    # Used as the `running` lifecycle hook in ci-terraform and ci-ansible.
    - name: ci-notify-running
      timeout: "3m"
      inputs:
        parameters:
          - name: sha
          - name: context     # e.g. "ci/terraform-datadog"
          - name: description
          - name: branch      # git ref e.g. "refs/heads/master"
          - name: start       # RFC3339 — pass {{workflow.creationTimestamp}}
      steps:
        - - name: github
            template: github-notify
            arguments:
              parameters:
                - name: sha
                  value: "{{inputs.parameters.sha}}"
                - name: state
                  value: pending
                - name: context
                  value: "{{inputs.parameters.context}}"
                - name: description
                  value: "{{inputs.parameters.description}}"
          - name: datadog
            template: datadog-notify
            arguments:
              parameters:
                - name: name
                  value: "{{inputs.parameters.context}}"
                - name: status
                  value: running
                - name: sha
                  value: "{{inputs.parameters.sha}}"
                - name: branch
                  value: "{{inputs.parameters.branch}}"
                - name: start
                  value: "{{inputs.parameters.start}}"
                - name: final
                  value: "false"

    # Combined exit notification: GitHub (success/failure) + Datadog (success/error) in parallel.
    # Used as the `exit` lifecycle hook in ci-terraform and ci-ansible.
    - name: ci-notify-exit
      timeout: "3m"
      inputs:
        parameters:
          - name: sha
          - name: context
          - name: status    # "success" or "failure"
          - name: branch
          - name: start     # RFC3339 — pass {{workflow.creationTimestamp}}
      steps:
        - - name: github
            template: github-notify
            arguments:
              parameters:
                - name: sha
                  value: "{{inputs.parameters.sha}}"
                - name: state
                  value: "{{inputs.parameters.status}}"
                - name: context
                  value: "{{inputs.parameters.context}}"
                - name: description
                  value: "{{= inputs.parameters.status == 'success' ? 'passed' : 'failed'}}"
          - name: datadog
            template: datadog-notify
            arguments:
              parameters:
                - name: name
                  value: "{{inputs.parameters.context}}"
                - name: status
                  value: "{{inputs.parameters.status}}"
                - name: sha
                  value: "{{inputs.parameters.sha}}"
                - name: branch
                  value: "{{inputs.parameters.branch}}"
                - name: start
                  value: "{{inputs.parameters.start}}"
                - name: final
                  value: "true"
