---
# Generic Dockerfile image build and push using rootless BuildKit.
# No shared emptyDir volumes across pods — uses Kubernetes initContainers
# within a single pod to share /workspace (cloned repo) and /docker-config
# (Docker Hub credentials fetched from Vault at runtime).
#
# Supports an optional Go pre-build step (go_build: "true") for images that
# require a compiled Go binary before the Docker build (e.g. memory-webhook).
# When enabled, the Go binary is compiled into the context directory so BuildKit
# can COPY it into a thin runtime image without a Go toolchain inside.
#
# Vault secret layout (kv-v2):
#   secret/ci/docker → username, password (Docker Hub credentials)
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ci-image-build
  namespace: argo
spec:
  serviceAccountName: argo-ci
  entrypoint: main
  synchronization:
    semaphore:
      configMapKeyRef:
        name: ci-semaphore
        key: ci
  arguments:
    parameters:
      - name: git-ref
      - name: git-sha
      - name: path-filter
      - name: image          # e.g. docker.io/st0rmingbr4in/ci-ansible
      - name: context        # repo-relative path containing Dockerfile, e.g. ci/images/ci-ansible
      - name: go_build       # set to "true" to compile a Go binary before the Docker build
        default: "false"
  templates:
    - name: main
      steps:
        - - name: check-paths
            templateRef:
              name: ci-common
              template: check-paths
            arguments:
              parameters:
                - name: path-filter
                  value: "{{workflow.parameters.path-filter}}"
        - - name: build-push
            template: build-push
            when: "'{{steps.check-paths.outputs.result}}' == 'changed' && '{{workflow.parameters.git-ref}}' == 'refs/heads/master'"

    - name: build-push
      # initContainers run sequentially before the main container in the same pod,
      # sharing the emptyDir volumes defined here.
      volumes:
        - name: workspace
          emptyDir: {}
        - name: docker-config
          emptyDir:
            medium: Memory
      initContainers:
        - name: clone
          image: alpine/git@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
          command: [sh, -c]
          args:
            - git clone "$REPO_URL" /workspace
          env:
            - name: REPO_URL
              valueFrom:
                configMapKeyRef:
                  name: ci-config
                  key: REPO_URL
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        # Optional Go build step: only active when go_build == "true".
        # Compiles the Go binary natively on amd64 so BuildKit can COPY it into
        # a thin runtime image. Image version must match go.mod — kept in sync by Renovate.
        - name: go-build
          image: "{{= workflow.parameters.go_build == 'true' ? 'golang:1.25-alpine@sha256:7a00384194cf2cb68924bbb918d675f1517357433c8541bac0ab2f929b9d5447' : 'alpine:3.21' }}"
          command: [sh, -c]
          args:
            - |
              if [ "{{workflow.parameters.go_build}}" != "true" ]; then
                echo "go_build=false, skipping Go compilation"
                exit 0
              fi
              cd /workspace/{{workflow.parameters.context}}
              CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
                go build -a -installsuffix cgo -o webhook main.go
          resources:
            requests:
              memory: 256Mi
              cpu: 500m
            limits:
              memory: 512Mi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        - name: fetch-docker-creds
          image: alpine:3.21
          command: [sh, -c]
          args:
            - |
              set -e
              apk add --no-cache curl jq -q
              VAULT_TOKEN=$(curl -sk \
                --data "{\"jwt\":\"$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)\",\"role\":\"argo-ci\"}" \
                "${VAULT_ADDR}/v1/auth/kubernetes/login" \
                | jq -r '.auth.client_token')
              [ -n "$VAULT_TOKEN" ] && [ "$VAULT_TOKEN" != "null" ] \
                || { echo "Vault login failed"; exit 1; }
              USERNAME=$(curl -sk -H "X-Vault-Token: $VAULT_TOKEN" \
                "${VAULT_ADDR}/v1/secret/data/ci/docker" \
                | jq -r '.data.data.username')
              PASSWORD=$(curl -sk -H "X-Vault-Token: $VAULT_TOKEN" \
                "${VAULT_ADDR}/v1/secret/data/ci/docker" \
                | jq -r '.data.data.password')
              printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' \
                "$(printf '%s:%s' "$USERNAME" "$PASSWORD" | base64 | tr -d '\n')" \
                > /docker-config/config.json
          env:
            - name: VAULT_ADDR
              valueFrom:
                configMapKeyRef:
                  name: ci-config
                  key: VAULT_ADDR
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
          volumeMounts:
            - name: docker-config
              mountPath: /docker-config
      container:
        image: moby/buildkit@sha256:93efd7f1c17f16cea080c34f68e19863b9fe541db550bf607221ce425c0ab9ef
        command: [buildctl-daemonless.sh]
        args:
          - build
          - --frontend=dockerfile.v0
          - --local=context=/workspace/{{workflow.parameters.context}}
          - --local=dockerfile=/workspace/{{workflow.parameters.context}}
          - --output=type=image,"name={{workflow.parameters.image}}:latest,{{workflow.parameters.image}}:{{workflow.parameters.git-sha}}",push=true
        env:
          - name: DOCKER_CONFIG
            value: /docker-config
          # Required for rootless BuildKit: disables the OCI worker's process sandbox
          # so it can run without privileged mode.
          - name: BUILDKITD_FLAGS
            value: "--oci-worker-no-process-sandbox"
        # Rootless BuildKit — no privileged mode required.
        # Requires kernel unprivileged user namespaces (unprivileged_userns_clone=1),
        # confirmed on k3s-clusterv2-node1 (kernel 6.1.0-43-amd64, Debian 12).
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: Unconfined
        resources:
          requests:
            memory: 512Mi
            cpu: 500m
          limits:
            memory: 2Gi
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: docker-config
            mountPath: /docker-config
