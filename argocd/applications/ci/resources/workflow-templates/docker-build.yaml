---
# Container image build and push using rootless BuildKit (no daemon, no privileged pod).
# Requires kernel unprivileged user namespaces (unprivileged_userns_clone=1) — confirmed
# on k3s-clusterv2-node1 (kernel 6.1.0-43-amd64, Debian 12).
#
# Build strategy: Go binary is compiled natively in a go-build step then packaged by
# BuildKit using a thin Dockerfile (no Go toolchain inside the image).
#
# Vault secret layout (kv-v2):
#   secret/ci/docker → username, password (Docker Hub credentials)
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ci-docker-build
  namespace: argo
spec:
  serviceAccountName: argo-ci
  entrypoint: main
  synchronization:
    semaphore:
      configMapKeyRef:
        name: ci-semaphore
        key: ci
  arguments:
    parameters:
      - name: git-ref
      - name: git-sha
      - name: path-filter
        value: "memory-webhook"
      - name: image
        value: "docker.io/st0rmingbr4in/memory-webhook"
      - name: context
        value: "memory-webhook"
  volumes:
    - name: workspace
      emptyDir: {}
    - name: secrets
      emptyDir:
        medium: Memory
  templates:
    - name: main
      steps:
        - - name: clone
            templateRef:
              name: ci-common
              template: git-clone
          - name: vault-login
            templateRef:
              name: ci-common
              template: vault-login
        - - name: check-paths
            templateRef:
              name: ci-common
              template: check-paths
            arguments:
              parameters:
                - name: path-filter
                  value: "{{workflow.parameters.path-filter}}"
        - - name: go-build
            template: go-build
            when: "'{{steps.check-paths.outputs.result}}' == 'changed' && '{{workflow.parameters.git-ref}}' == 'refs/heads/master'"
        - - name: setup-docker-creds
            template: docker-creds
            when: "'{{steps.check-paths.outputs.result}}' == 'changed' && '{{workflow.parameters.git-ref}}' == 'refs/heads/master'"
        - - name: build-push
            template: buildkit-build
            when: "'{{steps.check-paths.outputs.result}}' == 'changed' && '{{workflow.parameters.git-ref}}' == 'refs/heads/master'"

    # Compile the Go binary natively on amd64. The resulting binary is placed in the
    # context directory so BuildKit can COPY it into the thin runtime image.
    # Image version must match the `go` directive in go.mod — kept in sync by Renovate.
    - name: go-build
      container:
        image: golang:1.25-alpine@sha256:7a00384194cf2cb68924bbb918d675f1517357433c8541bac0ab2f929b9d5447
        command: [sh, -c]
        resources:
          requests:
            memory: 256Mi
            cpu: 500m
          limits:
            memory: 512Mi
        args:
          - |
            cd /workspace/{{workflow.parameters.context}}
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
              go build -a -installsuffix cgo -o webhook main.go
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: docker-creds
      script:
        image: hashicorp/vault:1.17
        command: [sh]
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
        env:
          - name: VAULT_ADDR
            value: "https://vault.prod-infra.svc.cluster.local:8200"
          - name: VAULT_SKIP_VERIFY
            value: "true"
        source: |
          export VAULT_TOKEN=$(cat /secrets/vault-token)

          USERNAME=$(vault kv get -field=username secret/ci/docker)
          PASSWORD=$(vault kv get -field=password secret/ci/docker)

          mkdir -p /secrets/docker
          printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' \
            "$(printf '%s:%s' "$USERNAME" "$PASSWORD" | base64 -w0)" \
            > /secrets/docker/config.json
        volumeMounts:
          - name: secrets
            mountPath: /secrets

    - name: buildkit-build
      container:
        image: moby/buildkit@sha256:93efd7f1c17f16cea080c34f68e19863b9fe541db550bf607221ce425c0ab9ef
        command: [buildctl-daemonless.sh]
        resources:
          requests:
            memory: 512Mi
            cpu: 500m
          limits:
            memory: 1Gi
        args:
          - build
          - --frontend=dockerfile.v0
          - --local=context=/workspace/{{workflow.parameters.context}}
          - --local=dockerfile=/workspace/{{workflow.parameters.context}}
          - --output=type=image,"name={{workflow.parameters.image}}:latest,{{workflow.parameters.image}}:{{workflow.parameters.git-sha}}",push=true
        env:
          - name: BUILDKITD_FLAGS
            value: "--oci-worker-no-process-sandbox"
          - name: DOCKER_CONFIG
            value: /secrets/docker
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: Unconfined
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: secrets
            mountPath: /secrets
