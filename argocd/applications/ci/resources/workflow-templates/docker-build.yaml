---
# Container image build and push using rootless BuildKit (no daemon, no privileged pod).
# Requires kernel unprivileged user namespaces (unprivileged_userns_clone=1) — confirmed
# on k3s-clusterv2-node1 (kernel 6.1.0-43-amd64, Debian 12).
#
# Vault secret layout (kv-v2):
#   secret/ci/docker → username, password (Docker Hub credentials)
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ci-docker-build
  namespace: argo
spec:
  serviceAccountName: argo-ci
  entrypoint: main
  arguments:
    parameters:
      - name: git-ref
      - name: path-filter
        value: "memory-webhook"
      - name: image
        value: "docker.io/st0rmingbr4in/memory-webhook"
      - name: context
        value: "memory-webhook"
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: secrets
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Mi
  templates:
    - name: main
      steps:
        - - name: clone
            templateRef:
              name: ci-common
              template: git-clone
          - name: vault-login
            templateRef:
              name: ci-common
              template: vault-login
        - - name: check-paths
            templateRef:
              name: ci-common
              template: check-paths
            arguments:
              parameters:
                - name: path-filter
                  value: "{{workflow.parameters.path-filter}}"
        - - name: setup-docker-creds
            template: docker-creds
            when: "'{{steps.check-paths.outputs.result}}' == 'changed' && '{{workflow.parameters.git-ref}}' == 'refs/heads/master'"
        - - name: build-push
            template: buildkit-build
            when: "'{{steps.check-paths.outputs.result}}' == 'changed' && '{{workflow.parameters.git-ref}}' == 'refs/heads/master'"

    - name: docker-creds
      script:
        image: hashicorp/vault:1.17
        command: [sh]
        env:
          - name: VAULT_ADDR
            value: "https://vault.prod-infra.svc.cluster.local:8200"
          - name: VAULT_SKIP_VERIFY
            value: "true"
        source: |
          export VAULT_TOKEN=$(cat /secrets/vault-token)

          USERNAME=$(vault kv get -field=username secret/ci/docker)
          PASSWORD=$(vault kv get -field=password secret/ci/docker)

          mkdir -p /secrets/docker
          printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' \
            "$(printf '%s:%s' "$USERNAME" "$PASSWORD" | base64 -w0)" \
            > /secrets/docker/config.json
        volumeMounts:
          - name: secrets
            mountPath: /secrets

    - name: buildkit-build
      container:
        image: moby/buildkit@sha256:93efd7f1c17f16cea080c34f68e19863b9fe541db550bf607221ce425c0ab9ef
        command: [buildctl-daemonless.sh]
        args:
          - build
          - --frontend=dockerfile.v0
          - --local=context=/workspace/{{workflow.parameters.context}}
          - --local=dockerfile=/workspace/{{workflow.parameters.context}}
          - --output=type=image,name={{workflow.parameters.image}}:latest,push=true
        env:
          - name: BUILDKITD_FLAGS
            value: "--oci-worker-no-process-sandbox"
          - name: DOCKER_CONFIG
            value: /secrets/docker
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: Unconfined
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: secrets
            mountPath: /secrets
