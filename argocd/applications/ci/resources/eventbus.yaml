---
apiVersion: argoproj.io/v1alpha1
kind: EventBus
metadata:
  name: default
  namespace: argo
spec:
  nats:
    native:
      replicas: 3
      auth: token
      containerTemplate:
        resources:
          requests:
            memory: 64Mi
            cpu: 10m
          limits:
            memory: 256Mi
      metricsContainerTemplate:
        resources:
          requests:
            memory: 32Mi
            cpu: 5m
          limits:
            memory: 64Mi
