---
apiVersion: argoproj.io/v1alpha1
kind: EventBus
metadata:
  name: default
  namespace: argo
spec:
  jetstream:
    version: "latest"
    # Discard events older than 10 minutes so stale push events never trigger
    # new workflows when the cluster is under load.
    streamConfig: |
      maxAge: 10m
    containerTemplate:
      resources:
        requests:
          memory: 64Mi
          cpu: 10m
        limits:
          memory: 256Mi
    metricsContainerTemplate:
      resources:
        requests:
          memory: 32Mi
          cpu: 5m
        limits:
          memory: 64Mi
