---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: ci-terraform-tailscale
  namespace: argo
spec:
  template:
    serviceAccountName: argo-ci
  dependencies:
    - name: push
      eventSourceName: github
      eventName: push
      filters:
        data:
          - path: body.ref
            type: string
            value:
              - "refs/heads/master"
          - path: body
            type: string
            jqFilter: '.head_commit | ((.modified // []) + (.added // []) + (.removed // [])) | map(test("^terraform/tailscale")) | any'
            value:
              - "true"
  triggers:
    - template:
        name: trigger
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: ci-terraform-tailscale-
                namespace: argo
              spec:
                workflowTemplateRef:
                  name: ci-terraform
                arguments:
                  parameters:
                    - name: git-ref
                      value: "refs/heads/master"
                    - name: module
                      value: tailscale
                    - name: path-filter
                      value: "terraform/tailscale"
                    - name: vault-secret-path
                      value: "secret/ci/tailscale"
                    - name: git-sha
                      value: ""
                    - name: git-author-email
                      value: ""
          parameters:
            - src:
                dependencyName: push
                dataKey: body.ref
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: push
                dataKey: body.after
              dest: spec.arguments.parameters.4.value
            - src:
                dependencyName: push
                dataKey: body.head_commit.author.email
              dest: spec.arguments.parameters.5.value
      retryStrategy:
        steps: 3
