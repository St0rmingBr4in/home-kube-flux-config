---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cert-manager
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: cert-manager
            chart: cert-manager
            chartVersion: v1.20.1
            namespace: prod-infra
            repoURL: https://charts.jetstack.io

  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
    spec:
      project: default

      sources:
        - repoURL: "{{repoURL}}"
          chart: "{{chart}}"
          targetRevision: "{{chartVersion}}"
          helm:
            values: |
              installCRDs: true
              extraArgs:
                - "--dns01-recursive-nameservers-only=true"
                - "--dns01-recursive-nameservers=ns1.digitalocean.com:53,ns2.digitalocean.com:53,ns3.digitalocean.com:53"
              resources:
                limits:
                  memory: 100Mi
                requests:
                  cpu: 100m
                  memory: 100Mi
              webhook:
                resources:
                  limits:
                    memory: 100Mi
                  requests:
                    cpu: 100m
                    memory: 100Mi
              cainjector:
                resources:
                  limits:
                    memory: 130Mi
                  requests:
                    cpu: 100m
                    memory: 130Mi

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"

      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /status
          managedFieldsManagers:
            - kustomize-controller

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true

        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
