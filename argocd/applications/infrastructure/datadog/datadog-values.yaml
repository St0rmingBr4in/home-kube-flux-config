---
datadog:
  # Cluster configuration
  clusterName: home-lab
  site: datadoghq.eu

  # API key from existing secret
  apiKeyExistingSecret: datadog-api-key

  # Cluster checks and monitoring
  clusterChecks:
    enabled: true
  leaderElection: true
  collectEvents: true

  # Custom integrations for k3s cluster
  confd:
    systemd.yaml: |-
      init_config:

      instances:
        - unit_names:
            - k3s.service
            - k3s-node.service
            - sshd.service
          private_socket: /host/run/systemd/private
    journald.yaml: |-
      init_config:
      logs:
        - type: journald
          path: /host/run/log/journal
          include_units:
            - k3s.service
            - k3s-node.service
            - sshd.service
    etcd.yaml: |-
      init_config:

      instances:
        - prometheus_url: "http://%%env_DD_KUBERNETES_KUBELET_HOST%%:2381/metrics"

  # Container runtime configuration
  criSocketPath: /run/k3s/containerd/containerd.sock

  # Logging configuration
  logs:
    enabled: true
    containerCollectAll: true

  # Process monitoring — discovery only, no heavy per-process collection
  processAgent:
    enabled: true
    processCollection: false
    processDiscovery: true

  # Monitoring capabilities
  helmCheck:
    enabled: true
    collectEvents: true

  # Prometheus integration
  prometheusScrape:
    enabled: true
    serviceEndpoints: true

  # APM tracing
  apm:
    enabled: true

  # System probe (eBPF) — required for USM
  systemProbe:
    enabled: true

  # Universal Service Monitoring — auto-detects HTTP services (Jellyfin, *arr, etc.)
  serviceMonitoring:
    enabled: true

  # Kubernetes State Metrics
  kubeStateMetricsCore:
    collectVpaMetrics: true

# RBAC configuration
rbac:
  create: true

# Pod labels as tags
podLabelsAsTags:
  app: kube_app
  release: helm_release

# Agent configuration
agents:
  # Use default official Datadog images

  # Container resource configuration (memory request = limit, CPU request only)
  containers:
    agent:
      resources:
        limits:
          memory: 1.2Gi # Based on actual usage (~903Mi) with some headroom
        requests:
          cpu: 200m
          memory: 1Gi # Request less than limit
    processAgent:
      resources:
        limits:
          memory: 150Mi
        requests:
          cpu: 50m
          memory: 100Mi
    traceAgent:
      resources:
        limits:
          memory: 200Mi
        requests:
          cpu: 50m
          memory: 150Mi
    systemProbe:
      resources:
        limits:
          memory: 400Mi
        requests:
          cpu: 100m
          memory: 300Mi
    initContainers:
      resources:
        limits:
          memory: 150Mi
        requests:
          cpu: 50m
          memory: 150Mi

  # Node tolerations for scheduling
  tolerations:
    - effect: NoSchedule
      key: ram
      operator: Exists

  # Custom volumes for k3s monitoring
  volumes:
    - hostPath:
        path: /run/log
      name: logdir
    - hostPath:
        path: /run/systemd
      name: systemddir

  volumeMounts:
    - name: logdir
      mountPath: /host/run/log
    - name: systemddir
      mountPath: /host/run/systemd

# Cluster Agent configuration
clusterAgent:
  enabled: true
  apiKeyExistingSecret: datadog-api-key
  tokenExistingSecret: datadog-cluster-agent
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 512Mi
  tolerations:
    - effect: NoSchedule
      key: ram
      operator: Exists
  # Admission Controller: auto-injects DD_AGENT_HOST + DD_TRACE_AGENT_URL
  # into pods annotated with admission.datadoghq.com/enabled: "true"
  admissionController:
    enabled: true
    mutateUnlabelled: false

# Kube State Metrics configuration
kube-state-metrics:
  resources:
    limits:
      memory: 100Mi
    requests:
      cpu: 50m
      memory: 100Mi
