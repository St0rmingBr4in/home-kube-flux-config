---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vault-secrets-operator
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: vault-secrets-operator
            chart: vault-secrets-operator
            chartVersion: 1.3.0
            namespace: prod-infra
            repoURL: https://helm.releases.hashicorp.com

  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
    spec:
      project: default

      sources:
        - repoURL: "{{repoURL}}"
          chart: "{{chart}}"
          targetRevision: "{{chartVersion}}"
          helm:
            values: |
              defaultVaultConnection:
                enabled: true
                address: "https://vault.prod-infra.svc.cluster.local:8200"
                caCertSecret: "vault-internal-ca-secret"
                skipTLSVerify: false
              defaultAuthMethod:
                enabled: true
                namespace: "prod-infra"
                allowedNamespaces: ["*"]
                method: kubernetes
                mount: kubernetes
                kubernetes:
                  role: vso
                  serviceAccount: default
                  tokenExpirationSeconds: 600
              controller:
                manager:
                  resources:
                    requests:
                      memory: 128Mi
                      cpu: 100m
                    limits:
                      memory: 128Mi
                  clientCache:
                    persistenceModel: "none"
                    cacheSize: 1000
                  globalTransformationOptions:
                    excludeRaw: false
              metricsService:
                enabled: true
              telemetry:
                serviceMonitor:
                  enabled: false

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true

        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
