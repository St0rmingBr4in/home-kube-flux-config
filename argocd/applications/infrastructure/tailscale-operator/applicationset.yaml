---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tailscale-operator
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: tailscale-operator
            chart: tailscale-operator
            chartVersion: 1.94.2
            namespace: tailscale
            repoURL: https://pkgs.tailscale.com/helmcharts
            manifestPath: argocd/applications/infrastructure/tailscale-operator

  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
    spec:
      project: default

      sources:
        - repoURL: "{{repoURL}}"
          chart: "{{chart}}"
          targetRevision: "{{chartVersion}}"
          helm:
            values: |
              oauth:
                audience: ""
              apiServerProxyConfig:
                mode: "true"
                hostname: "home-kube-api"
              ingressProxyConfig:
                mode: "true"
              resources:
                limits:
                  cpu: 500m
                  memory: 128Mi
                requests:
                  cpu: 100m
                  memory: 64Mi
              image:
                pullPolicy: IfNotPresent
              serviceAccount:
                create: true
                name: "tailscale-operator"
              rbac:
                create: true
        - repoURL: https://github.com/St0rmingBr4in/home-kube-flux-config
          targetRevision: HEAD
          path: "{{manifestPath}}"

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true

        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
