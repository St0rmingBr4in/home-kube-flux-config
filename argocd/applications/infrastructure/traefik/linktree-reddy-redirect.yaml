---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: linktree-reddy-redirect
  namespace: prod-infra
spec:
  redirectRegex:
    regex: ".*"
    replacement: "https://linktr.ee/reddy_fur"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: linktree-reddy-ingressroute
  namespace: prod-infra
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`linktree-reddy.st0rmingbr4in.com`)
      middlewares:
        - name: linktree-reddy-redirect
      services:
        - name: noop@internal
          kind: TraefikService
  tls:
    secretName: st0rmingbr4in.com-cert
