---
# Mirrors the minio credentials from Vault into the argo namespace so the
# Argo Workflows executor can authenticate to the MinIO artifact repository.
#
# Prerequisite: populate Vault before first sync (same path as MinIO itself):
#   vault kv put secret/minio \
#     access_key="<admin-username>" \
#     secret_key="<admin-password-min-8-chars>"
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: argo-artifact-credentials
  namespace: argo
spec:
  mount: secret
  path: minio
  type: kv-v2
  vaultAuthRef: prod-infra/default
  destination:
    create: true
    name: argo-artifact-credentials
    overwrite: true
  hmacSecretData: true
  refreshAfter: 24h
