---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argo-workflows
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: argo-workflows
            chart: argo-workflows
            chartVersion: 1.0.7
            namespace: argo
            repoURL: https://argoproj.github.io/argo-helm
            manifestPath: argocd/applications/infrastructure/argo-workflows

  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
    spec:
      project: default

      sources:
        - repoURL: "{{repoURL}}"
          chart: "{{chart}}"
          targetRevision: "{{chartVersion}}"
          helm:
            values: |
              workflow:
                serviceAccount:
                  create: true
                  name: argo-workflow-default
                rbac:
                  create: true
              controller:
                serviceAccount:
                  create: true
                  name: argo-workflows-controller
                workflowNamespaces:
                  - argo
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    memory: 512Mi
              server:
                enabled: true
                authModes:
                  - server
                ingress:
                  enabled: false
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    memory: 256Mi
              executor:
                resources:
                  requests:
                    cpu: 100m
                    memory: 64Mi
                  limits:
                    memory: 512Mi
        - repoURL: https://github.com/St0rmingBr4in/home-kube-flux-config
          targetRevision: HEAD
          path: "{{manifestPath}}"

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
