---
# Patches the Helm-managed configmap via SSA to add archive log settings.
# Helm owns the "config:" key; this manifest owns "archiveLogs:" and
# "artifactRepository:" as separate top-level data keys.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argo-workflows-workflow-controller-configmap
  namespace: argo
data:
  archiveLogs: "true"
  artifactRepository: |
    s3:
      bucket: argo-logs
      endpoint: nasse.hard.st0rmingbr4in.com:9000
      insecure: true
      createBucketIfNotPresent:
        objectLocking: false
      accessKeySecret:
        name: argo-artifact-credentials
        key: access_key
      secretKeySecret:
        name: argo-artifact-credentials
        key: secret_key
