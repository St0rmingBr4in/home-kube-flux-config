---
# Global Argo Workflows controller configuration.
# archiveLogs: streams all pod logs to the S3 artifact repository so they
# persist after pods are GC'd (OnWorkflowCompletion).
apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-controller-configmap
  namespace: argo
data:
  archiveLogs: "true"
  artifactRepository: |
    s3:
      bucket: argo-logs
      endpoint: nasse.hard.st0rmingbr4in.com:9000
      insecure: true
      createBucketIfNotPresent:
        objectLocking: false
      accessKeySecret:
        name: argo-artifact-credentials
        key: access_key
      secretKeySecret:
        name: argo-artifact-credentials
        key: secret_key
