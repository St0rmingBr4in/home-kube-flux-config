---
# Woodpecker CI — public endpoint (no Authentik forward-auth).
# Woodpecker has its own GitHub OAuth authentication (WOODPECKER_OPEN=false,
# WOODPECKER_ADMIN=St0rmingBr4in), so an additional Authentik layer is redundant.
# GitHub OAuth callback:  https://woodpecker.st0rmingbr4in.com/authorize
# GitHub webhook URL:     https://woodpecker.st0rmingbr4in.com/api/hook
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: woodpecker
  namespace: woodpecker
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: "Host(`woodpecker.st0rmingbr4in.com`)"
      services:
        - name: woodpecker-server
          port: 80
  tls:
    secretName: st0rmingbr4in.com-cert
