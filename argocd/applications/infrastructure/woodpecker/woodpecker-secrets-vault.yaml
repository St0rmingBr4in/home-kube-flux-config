---
# Syncs Woodpecker CI credentials from Vault into the woodpecker namespace.
#
# Populate before first sync:
#   vault kv put secret/ci/woodpecker \
#     WOODPECKER_GITHUB_CLIENT="<GitHub OAuth App Client ID>" \
#     WOODPECKER_GITHUB_SECRET="<GitHub OAuth App Client Secret>" \
#     WOODPECKER_AGENT_SECRET="$(openssl rand -hex 32)"
#
# Create the GitHub OAuth App at:
#   https://github.com/settings/developers → OAuth Apps → New OAuth App
#     Homepage URL:             https://woodpecker.st0rmingbr4in.com
#     Authorization callback:   https://woodpecker.st0rmingbr4in.com/authorize
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: woodpecker-secrets
  namespace: woodpecker
spec:
  mount: secret
  path: ci/woodpecker
  type: kv-v2
  vaultAuthRef: prod-infra/default
  destination:
    create: true
    name: woodpecker-secrets
    overwrite: true
  hmacSecretData: true
  refreshAfter: 24h
---
# The Woodpecker Helm chart always mounts woodpecker-default-agent-secret on the agent pod
# (even when createAgentSecret=false). Provide it here with only WOODPECKER_AGENT_SECRET.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: woodpecker-default-agent-secret
  namespace: woodpecker
spec:
  mount: secret
  path: ci/woodpecker
  type: kv-v2
  vaultAuthRef: prod-infra/default
  destination:
    create: true
    name: woodpecker-default-agent-secret
    overwrite: true
    transformation:
      includes:
        - WOODPECKER_AGENT_SECRET
  hmacSecretData: true
  refreshAfter: 24h
