---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ats-backend
  namespace: prod-ats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ats-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ats-backend
        tags.datadoghq.com/service: ats-backend
        tags.datadoghq.com/env: prod
      annotations:
        admission.datadoghq.com/enabled: "true"
        ad.datadoghq.com/ats-backend.logs: '[{"source":"go","service":"ats-backend"}]'
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: ats-backend
          image: ats-backend:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: ats-website # DATABASE_URL and any future backend config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
