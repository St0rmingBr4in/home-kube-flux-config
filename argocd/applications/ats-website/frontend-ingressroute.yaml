---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ats-frontend
  namespace: prod-infra
spec:
  entryPoints:
    - websecure
  routes:
    # Authentik OIDC callback path — must bypass any middleware so Authentik can complete the flow
    - kind: Rule
      match: Host(`ats.st0rmingbr4in.com`) && PathPrefix(`/outpost.goauthentik.io`)
      priority: 100
      services:
        - name: ak-outpost-authentik-embedded-outpost
          namespace: prod-infra
          port: 9000
    # Main application — no forward-auth middleware, Auth.js handles sessions via OIDC
    - kind: Rule
      match: Host(`ats.st0rmingbr4in.com`)
      priority: 10
      services:
        - name: ats-frontend
          port: 3000
  tls:
    secretName: st0rmingbr4in.com-cert
