---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ats-frontend
  namespace: prod-ats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ats-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ats-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: ats-frontend
          image: ats-frontend:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: ats-website           # DATABASE_URL, AUTH_SECRET, Datadog RUM tokens
            - secretRef:
                name: ats-website-authentik # AUTHENTIK_CLIENT_ID, AUTHENTIK_CLIENT_SECRET, AUTHENTIK_ISSUER
          env:
            - name: BACKEND_URL
              value: http://ats-backend:8080
            - name: AUTH_URL
              value: https://ats.st0rmingbr4in.com
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
