---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ats-postgres
  namespace: prod-ats
spec:
  serviceName: ats-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ats-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ats-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: ats
            - name: POSTGRES_USER
              value: ats
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ats-website
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              # pg_isready alone does not detect iSCSI I/O errors — the postmaster
              # accepts connections but immediately fails on catalog reads.
              # Adding a SELECT 1 exercises an actual I/O path so that when the
              # underlying volume is disconnected, the probe fails and Kubernetes
              # restarts the pod (which re-mounts the volume cleanly).
              command:
                - /bin/sh
                - -c
                - "pg_isready -U ats -d ats && psql -U ats -d ats -c 'SELECT 1' -t > /dev/null"
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ats-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: ats-postgres
  namespace: prod-ats
spec:
  selector:
    app.kubernetes.io/name: ats-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
