---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ats-postgres
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: ats-postgres
    namespace: prod-ats
  iscsi:
    targetPortal: 192.168.42.42
    iqn: iqn.2000-01.com.synology:ats-postgres
    lun: 1
    fsType: ext4
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  volumeMode: Filesystem
