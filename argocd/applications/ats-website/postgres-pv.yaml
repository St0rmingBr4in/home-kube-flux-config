---
# Pre-requisite: create an iSCSI target on the Synology NAS named "ats-postgres"
# and note the IQN, then fill in the iqn field below.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ats-postgres
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 2Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: ats-postgres
    namespace: prod-infra
  iscsi:
    targetPortal: 192.168.42.42
    iqn: iqn.2000-01.com.synology:ats-postgres   # TODO: verify IQN after creating the target
    lun: 1
    fsType: ext4
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
