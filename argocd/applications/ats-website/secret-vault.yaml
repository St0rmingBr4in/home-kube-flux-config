---
# App secrets (DATABASE_URL, AUTH_SECRET, Datadog RUM tokens) — managed manually in Vault
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ats-website
  namespace: prod-ats
spec:
  mount: secret
  path: ats-website
  type: kv-v2
  vaultAuthRef: prod-infra/default
  destination:
    create: true
    name: ats-website
    overwrite: true
  hmacSecretData: true
  refreshAfter: 24h
---
# Authentik OIDC credentials — written automatically by Terraform (terraform/authentik/ats-website.tf)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ats-website-authentik
  namespace: prod-ats
spec:
  mount: secret
  path: authentik/ats-website
  type: kv-v2
  vaultAuthRef: prod-infra/default
  destination:
    create: true
    name: ats-website-authentik
    overwrite: true
  hmacSecretData: true
  refreshAfter: 24h
---
# GHCR image pull secret
# Pre-requisite: store in Vault at secret/ci/ghcr-pull-secret:
#   .dockerconfigjson = base64-encoded dockerconfig JSON with a GitHub PAT (read:packages scope)
#   e.g.: {"auths":{"ghcr.io":{"auth":"<base64(username:PAT)>"}}}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ghcr-pull-secret
  namespace: prod-ats
spec:
  mount: secret
  path: ci/ghcr-pull-secret
  type: kv-v2
  vaultAuthRef: prod-infra/default
  destination:
    create: true
    name: ghcr-pull-secret
    overwrite: true
    type: kubernetes.io/dockerconfigjson
  hmacSecretData: true
  refreshAfter: 24h
