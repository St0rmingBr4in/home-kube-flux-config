---
# Traefik IngressRoute for Bazarr
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bazarr
  namespace: prod-media
  labels:
    app.kubernetes.io/name: bazarr
    app.kubernetes.io/instance: bazarr
spec:
  entryPoints:
    - websecure
  routes:
    # Authentik outpost path (higher priority, no auth middleware)
    - kind: Rule
      match: Host(`bazarr.st0rmingbr4in.com`) && PathPrefix(`/outpost.goauthentik.io`)
      priority: 100
      services:
        - name: ak-outpost-authentik-embedded-outpost
          namespace: prod-infra
          port: 9000
    # Bazarr API (no auth middleware, API key authentication handled by bazarr itself)
    - kind: Rule
      match: Host(`bazarr.st0rmingbr4in.com`) && PathPrefix(`/api/`)
      priority: 50
      services:
        - name: bazarr
          port: 6767
    # Main Bazarr application (with Authentik forward auth)
    - kind: Rule
      match: Host(`bazarr.st0rmingbr4in.com`)
      priority: 10
      middlewares:
        - name: authentik-forward-auth
          namespace: prod-infra
      services:
        - name: bazarr
          port: 6767
