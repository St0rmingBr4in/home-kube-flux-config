---
operator:
  verify:
    enabled: false
  traefik:
    namespace: prod-infra

ingress:
  main:
    enabled: false

service:
  main:
    ports:
      main:
        port: 8080
  torrent:
    enabled: true
    type: LoadBalancer
    loadBalancerClass: tailscale
    annotations:
      tailscale.com/hostname: "qbittorrent-torrent"
      tailscale.com/proxy-class: "proxy-resources"
    ports:
      torrent:
        enabled: true
        port: 6881
        targetPort: 6881
        protocol: tcp

resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 1Gi

persistence:
  config:
    enabled: true
    existingClaim: qbittorrent-config
  downloads:
    enabled: true
    existingClaim: media-downloads
    mountPath: /downloads

env:
  TZ: Europe/Paris

securityContext:
  runAsUser: 1031
  runAsGroup: 100

# Secret stub (disabled) — actual secret created by VaultStaticSecret as qbittorrent-tailscale-authkey
secret:
  tailscale-authkey:
    enabled: false
    type: Opaque
    data:
      TS_AUTHKEY: "placeholder"

# Image used by the TrueCharts Tailscale addon (routes traffic through inlet exit node)
tailscaleImage:
  repository: ghcr.io/tailscale/tailscale
  tag: v1.96.4
  pullPolicy: IfNotPresent

# Alpine image for the kill-switch init container (Tailscale image is distroless, no shell/iptables)
killSwitchImage:
  repository: alpine
  tag: "3.21"
  pullPolicy: IfNotPresent

podOptions:
  automountServiceAccountToken: true

workload:
  main:
    podSpec:
      initContainers:
        vpn-kill-switch:
          enabled: true
          type: init
          imageSelector: killSwitchImage
          securityContext:
            # Required: iptables manipulation needs CAP_NET_ADMIN and must run as root
            # because iptables-legacy writes to /run/xtables.lock (root-owned).
            # This init container exits before the main qbittorrent process starts.
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add:
                - NET_ADMIN
          command:
            - sh
            - -c
            - |
              apk add --no-cache iptables
              # Kill switch: block all direct internet traffic; only allow:
              #  - loopback
              #  - traffic routed through tailscale0 (the exit-node tunnel)
              #  - Tailscale CGNAT IPs (100.64.0.0/10) for control-plane packets
              #  - WireGuard direct (UDP 41641)
              #  - Tailscale coordination + DERP relays (TCP/UDP 443, UDP 3478)
              #  - DNS
              #  - ESTABLISHED/RELATED (replies to allowed connections)
              #
              # The "-o tailscale0" rule matches once Tailscale creates the
              # interface, so there is no direct-routing window after startup.
              iptables -A OUTPUT -o lo -j ACCEPT
              iptables -A OUTPUT -o tailscale0 -j ACCEPT
              iptables -A OUTPUT -d 100.64.0.0/10 -j ACCEPT
              iptables -A OUTPUT -p udp --dport 41641 -j ACCEPT
              iptables -A OUTPUT -p tcp --dport 443 -j ACCEPT
              iptables -A OUTPUT -p udp --dport 443 -j ACCEPT
              iptables -A OUTPUT -p udp --dport 3478 -j ACCEPT
              iptables -A OUTPUT -p udp --dport 53 -j ACCEPT
              iptables -A OUTPUT -p tcp --dport 53 -j ACCEPT
              iptables -A OUTPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
              iptables -A OUTPUT -j DROP

addons:
  tailscale:
    enabled: true
    container:
      env:
        TS_AUTH_KEY:
          secretKeyRef:
            name: tailscale-authkey
            key: TS_AUTHKEY
        TS_HOSTNAME: qbittorrent
        TS_EXTRA_ARGS: "--exit-node=inlet --exit-node-allow-lan-access"
        TS_ACCEPT_DNS: "false"
        TS_KUBE_SECRET: ""
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
