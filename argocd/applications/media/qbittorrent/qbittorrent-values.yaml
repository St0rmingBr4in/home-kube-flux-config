---
operator:
  verify:
    enabled: false
  traefik:
    namespace: prod-infra

ingress:
  main:
    enabled: false

service:
  main:
    ports:
      main:
        port: 8080
  torrent:
    enabled: true
    type: LoadBalancer
    loadBalancerClass: tailscale
    annotations:
      tailscale.com/hostname: "qbittorrent-torrent"
      tailscale.com/proxy-class: "proxy-resources"
    ports:
      torrent:
        enabled: true
        port: 6881
        targetPort: 6881
        protocol: tcp

resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 1Gi

persistence:
  config:
    enabled: true
    existingClaim: qbittorrent-config
  downloads:
    enabled: true
    existingClaim: media-downloads
    mountPath: /downloads

env:
  TZ: Europe/Paris

securityContext:
  runAsUser: 1031
  runAsGroup: 100

# Secret stub (disabled) — actual secret created by VaultStaticSecret as qbittorrent-tailscale-authkey
secret:
  tailscale-authkey:
    enabled: false
    type: Opaque
    data:
      TS_AUTHKEY: "placeholder"

# Image used by the TrueCharts Tailscale addon (routes traffic through inlet exit node)
tailscaleImage:
  repository: ghcr.io/tailscale/tailscale
  tag: latest
  pullPolicy: Always

podOptions:
  automountServiceAccountToken: true

workload:
  main:
    podSpec:
      initContainers:
        vpn-kill-switch:
          enabled: true
          imageSelector: tailscaleImage
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          command:
            - sh
            - -c
            - |
              # Allow loopback and Tailscale traffic, then drop everything else.
              # This ensures qbittorrent cannot route traffic outside of inlet
              # if the Tailscale exit node is unavailable.
              iptables -A OUTPUT -o lo -j ACCEPT
              iptables -A OUTPUT -d 100.64.0.0/10 -j ACCEPT
              iptables -A OUTPUT -p udp --dport 41641 -j ACCEPT
              iptables -A OUTPUT -p udp --dport 53 -j ACCEPT
              iptables -A OUTPUT -p tcp --dport 53 -j ACCEPT
              iptables -A OUTPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
              iptables -A OUTPUT -j DROP

addons:
  tailscale:
    enabled: true
    container:
      env:
        TS_AUTH_KEY:
          secretKeyRef:
            name: tailscale-authkey
            key: TS_AUTHKEY
        TS_HOSTNAME: qbittorrent
        TS_EXTRA_ARGS: "--exit-node=inlet-1 --exit-node-allow-lan-access"
        TS_ACCEPT_DNS: "false"
        TS_KUBE_SECRET: ""
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
