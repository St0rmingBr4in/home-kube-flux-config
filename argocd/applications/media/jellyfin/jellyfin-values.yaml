---
operator:
  verify:
    enabled: false
  traefik:
    namespace: prod-infra

ingress:
  main:
    integrations:
      traefik:
        enableFixedMiddlewares: false
        middlewares:
    enabled: true
    hosts:
      - host: jellyfin.st0rmingbr4in.com
        paths:
          - path: /

resources:
  limits:
    cpu: 7
    memory: 4Gi
  requests:
    cpu: 3500m
    memory: 4Gi

podSecurityContext:
  supplementalGroups:
    - 107 # render
    - 44 # video

workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              enabled: true
              type: exec
              command:
                - sh
                - -c
                - touch /config/.liveness
              spec:
                initialDelaySeconds: 12
                periodSeconds: 15
                failureThreshold: 5
                timeoutSeconds: 5

persistence:
  config:
    enabled: true
    existingClaim: jellyfin-config
  media:
    enabled: true
    existingClaim: media-library
    mountPath: /media
