---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: cleanuparr-config
spec:
  accessModes:
    - ReadWriteOnce
    - ReadOnlyMany
  capacity:
    storage: 1Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: cleanuparr-config
    namespace: prod-media
  iscsi:
    targetPortal: 192.168.42.42
    iqn: iqn.2000-01.com.synology:cleanuparr-config
    lun: 1
    fsType: ext4
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
