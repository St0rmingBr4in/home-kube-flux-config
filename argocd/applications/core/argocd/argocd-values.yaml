# ArgoCD Configuration (Bootstrap + Self-Management)
# URL: https://argocd.st0rmingbr4in.com
# CLI: argocd login argocd.st0rmingbr4in.com --username admin --grpc-web

# Application Controller (main workload) - actual usage: 307m CPU, 670Mi memory
controller:
  resources:
    limits:
      memory: 1Gi # Increased from 512Mi after OOMKills
    requests:
      cpu: 300m # Based on actual usage
      memory: 700Mi # Based on observed usage (~670Mi)

# Repository Server - processes Helm charts and Git repos (was getting OOMKilled at 256Mi)
repoServer:
  resources:
    limits:
      memory: 2Gi # Increased significantly for complex Helm chart processing (VSO, etc.)
    requests:
      cpu: 50m # Slightly increased for better performance
      memory: 256Mi # Typical usage ~99Mi; 2Gi limit kept for chart processing spikes

# ArgoCD Server - actual usage: 3m CPU, 25Mi memory
server:
  resources:
    limits:
      memory: 100Mi
    requests:
      cpu: 10m # Based on actual usage
      memory: 100Mi

  service:
    type: ClusterIP

  # Ingress disabled - using custom IngressRoute with Authentik
  ingress:
    enabled: false

  # Run in insecure mode since TLS is terminated at Traefik
  extraArgs:
    - --insecure

# Dex Server - actual usage: 1m CPU, 25Mi memory
dex:
  resources:
    limits:
      memory: 64Mi # Generous headroom
    requests:
      cpu: 5m # Based on actual usage
      memory: 64Mi # Same as limit for guaranteed QoS

# Redis - actual usage: 7m CPU, 10Mi memory
redis:
  resources:
    limits:
      memory: 32Mi # Generous headroom
    requests:
      cpu: 10m # Based on actual usage
      memory: 32Mi # Same as limit for guaranteed QoS

# Notifications Controller - actual usage: 1m CPU, 31Mi memory
notifications:
  resources:
    limits:
      memory: 64Mi # Generous headroom
    requests:
      cpu: 5m # Based on actual usage
      memory: 64Mi # Same as limit for guaranteed QoS

# ApplicationSet Controller - actual usage: 2m CPU, 27Mi memory
applicationSet:
  resources:
    limits:
      memory: 64Mi # Generous headroom
    requests:
      cpu: 5m # Based on actual usage
      memory: 64Mi # Same as limit for guaranteed QoS

configs:
  # ArgoCD configuration
  cm:
    # URL for web access via Authentik
    url: https://argocd.st0rmingbr4in.com

    # Repository configuration for self-management
    repositories: |
      - name: home-kube-flux-config
        type: git
        url: https://github.com/St0rmingBr4in/home-kube-flux-config

    # Service account for PostSync/SyncFail health hooks
    accounts.health-hook: apiKey

    # Custom health checks for Argo Events CRDs (not natively known to ArgoCD).
    # Without these, EventBus/EventSource/Sensor stay Progressing forever, blocking
    # PostSync hooks and masking real deployment failures.
    resource.customizations.health.argoproj.io_EventBus: |
      hs = {}
      if obj.status ~= nil then
        if obj.status.conditions ~= nil then
          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "Deployed" and condition.status == "True" then
              hs.status = "Healthy"
              hs.message = condition.message
              return hs
            end
            if condition.type == "Deployed" and condition.status == "False" then
              hs.status = "Degraded"
              hs.message = condition.message
              return hs
            end
          end
        end
      end
      hs.status = "Progressing"
      hs.message = "Waiting for EventBus to be deployed"
      return hs
    resource.customizations.health.argoproj.io_EventSource: |
      hs = {}
      if obj.status ~= nil then
        if obj.status.conditions ~= nil then
          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "DeployedSuccessfully" and condition.status == "True" then
              hs.status = "Healthy"
              hs.message = condition.message
              return hs
            end
            if condition.type == "DeployedSuccessfully" and condition.status == "False" then
              hs.status = "Degraded"
              hs.message = condition.message
              return hs
            end
          end
        end
      end
      hs.status = "Progressing"
      hs.message = "Waiting for EventSource to be deployed"
      return hs
    resource.customizations.health.argoproj.io_Sensor: |
      hs = {}
      if obj.status ~= nil then
        if obj.status.conditions ~= nil then
          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "DeployedSuccessfully" and condition.status == "True" then
              hs.status = "Healthy"
              hs.message = condition.message
              return hs
            end
            if condition.type == "DeployedSuccessfully" and condition.status == "False" then
              hs.status = "Degraded"
              hs.message = condition.message
              return hs
            end
          end
        end
      end
      hs.status = "Progressing"
      hs.message = "Waiting for Sensor to be deployed"
      return hs

  rbac:
    policy.csv: |
      p, role:health-hook, applications, get, */*, allow
      p, role:health-hook, applications, sync, */*, allow
      g, health-hook, role:health-hook
