apiVersion: batch/v1
kind: Job
metadata:
  name: syncfail-rollback
  annotations:
    argocd.argoproj.io/hook: SyncFail
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 120
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: app-health-hook
      restartPolicy: Never
      containers:
        - name: hook
          image: alpine:3.21
          command:
            - sh
            - -c
            - apk add --no-cache curl jq -q && sh /scripts/syncfail.sh
          env:
            - name: APP_NAME
              value: "" # Override via patch: set to the ArgoCD application name
          envFrom:
            - secretRef:
                name: argocd-credentials
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: hook-scripts
            defaultMode: 0755
