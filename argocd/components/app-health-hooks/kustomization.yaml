apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Adds ArgoCD PostSync and SyncFail hook Jobs to an application.
#
# Credentials are provisioned automatically via VaultStaticSecret from
# shared Vault paths:
#   secret/app-health-hooks/datadog  →  DD_API_KEY, DD_APP_KEY, DD_SITE
#   secret/app-health-hooks/argocd   →  ARGOCD_SERVER, ARGOCD_AUTH_TOKEN
#
# Usage in an app's kustomization.yaml:
#
#   components:
#     - ../../../components/app-health-hooks
#
#   patches:
#     - target:
#         kind: Job
#         name: postsync-health-check
#       patch: |-
#         apiVersion: batch/v1
#         kind: Job
#         metadata:
#           name: postsync-health-check
#         spec:
#           template:
#             spec:
#               containers:
#                 - name: hook
#                   env:
#                     - name: APP_NAME
#                       value: qbittorrent   # <-- set to the ArgoCD app name

resources:
  - serviceaccount.yaml
  - scripts-configmap.yaml
  - postsync-job.yaml
  - syncfail-job.yaml
  - datadog-credentials-vault.yaml
  - argocd-credentials-vault.yaml
